<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>受付完了｜株式会社HAYASHI CREATIVE</title>
  <style>
    :root{--navy:#102c44;--orange:#ff7a00;--line:#d8e3eb}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#eef5f9;color:#17324a;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif}.card{width:min(640px,100%);padding:48px 32px;border-radius:24px;background:white;text-align:center;box-shadow:0 18px 50px rgba(17,45,68,.14)}.mark{display:grid;place-items:center;width:68px;height:68px;margin:0 auto 20px;border-radius:50%;background:#dcffe8;color:#146d3a;font-size:38px;font-weight:900}.eyebrow{margin:0 0 10px;color:var(--orange);font-size:14px;font-weight:800;letter-spacing:.08em}.card h1{margin:0;color:var(--navy);font-size:clamp(26px,6vw,40px)}.card p{margin:18px auto 0;max-width:480px;line-height:1.85}.note{padding:15px;margin-top:24px;border-radius:14px;background:#f3f8fb;color:#486077;font-size:14px}.back{display:inline-block;margin-top:28px;color:var(--navy);font-weight:800;text-decoration:none}.back:hover{text-decoration:underline}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark" aria-hidden="true">✓</div>
    <p class="eyebrow">受付完了</p>
    <h1>お申し込みを受け付けました。</h1>
    <p>受付確認メールをお送りしました。内容を確認のうえ、通常1〜2営業日以内にご連絡します。</p>
    <p class="note">確認メールが見当たらない場合は、迷惑メールフォルダもご確認ください。</p>
    <a class="back" href="/">トップページへ戻る</a>
  </main>
</body>
</html>
